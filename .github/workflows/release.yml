name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: cargo test --release --manifest-path daemon/Cargo.toml

      - name: Build release
        run: cargo build --release --manifest-path daemon/Cargo.toml

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/release/yaptt-daemon artifacts/
          cp target/release/yaptt-toggle artifacts/
          cp target/release/yaptt-indicator artifacts/
          tar czf artifacts.tar.gz -C artifacts .

      - name: Update PKGBUILD version
        run: |
          sed -i "s/pkgver=.*/pkgver=${{ steps.version.outputs.VERSION }}/" PKGBUILD
          sed -i "s/pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Commit PKGBUILD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git diff --cached --quiet || git commit -m "chore: update PKGBUILD to ${{ steps.version.outputs.VERSION }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts.tar.gz
          generate_release_notes: true
