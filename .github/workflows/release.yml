name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --release --manifest-path daemon/Cargo.toml

      - name: Build release
        run: cargo build --release --manifest-path daemon/Cargo.toml

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/release/yaptt-daemon artifacts/
          cp target/release/yaptt-toggle artifacts/
          cp target/release/yaptt-indicator artifacts/
          tar czf artifacts.tar.gz -C artifacts .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts.tar.gz
          generate_release_notes: true
