[package]
name = "ptt-daemon"
version = "0.1.0"
edition = "2021"
description = "System-wide push-to-talk for Wayland"

[[bin]]
name = "ptt-daemon"
path = "src/main.rs"

[dependencies]
evdev = "0.12"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dirs = "5"
